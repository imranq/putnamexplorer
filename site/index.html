<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Putnam Problem Browser</title>
  <script>
    (function () {
      const saved = localStorage.getItem("putnam_theme_v1");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true,
        processEnvironments: true
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="problems.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <button id="themeToggle" class="theme-fab" type="button" title="Toggle theme" aria-label="Toggle theme">☾</button>

  <main class="container">
    <header class="hero">
      <h1>Putnam Problem Browser</h1>
      <p>Search by keyword, year, section, and topic. Open any problem with full TeX and solution when available.</p>
    </header>

    <section class="mobile-nav">
      <button id="mobileFiltersToggle" class="mobile-filters-btn" type="button" aria-label="Toggle filters">☰ Filters</button>
      <select id="mobileProblemPicker" aria-label="Select problem"></select>
    </section>

    <section class="controls">
      <input id="search" type="search" placeholder="Search text, symbols, or keywords" />
      <select id="yearFilter"><option value="">All years</option></select>
      <select id="sessionFilter">
        <option value="">All sections</option>
        <option value="A">A</option>
        <option value="B">B</option>
      </select>
      <select id="topicFilter"><option value="">All topics</option></select>
      <label class="toggle">
        <input id="hasSolution" type="checkbox" />
        <span>Has solution</span>
      </label>
    </section>

    <section id="recentWrap" class="recent-wrap">
      <div class="recent-label">Recently viewed</div>
      <div id="recentRow" class="recent-row"></div>
    </section>

    <section class="layout">
      <aside>
        <p id="stats"></p>
        <div id="list" class="problem-list"></div>
      </aside>
      <article id="detail" class="detail">
        <h2>Select a problem</h2>
      </article>
    </section>
  </main>
</body>
</html>
